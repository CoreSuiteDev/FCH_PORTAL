services:

  web:
    build: 
      context: .
      target: web
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL}
    container_name: web
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  portal:
    build: 
      context: .
      target: portal
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL}
        - NEXT_PUBLIC_LOGIN_URL=${NEXT_PUBLIC_LOGIN_URL}
    container_name: portal
    restart: always
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3001
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  api:
    build: 
      context: .
      target: api
    container_name: api
    restart: always
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fch_portal?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORTAL_URL=${PORTAL_URL}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - LOG_FORMAT=${LOG_FORMAT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SMTP_USER_EMAIL=${SMTP_USER_EMAIL}
      - SMTP_CLIENT_ID=${SMTP_CLIENT_ID}
      - SMTP_CLIENT_SECRET=${SMTP_CLIENT_SECRET}
      - SMTP_REFRESH_TOKEN=${SMTP_REFRESH_TOKEN}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: always

    environment:
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=${DATABASE_DB:-fch_portal}
    
    volumes:
      - postgres_data:/var/lib/postgresql

    ports:
      - "5433:5432"
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  redis: 
    image: redis:7-alpine

    container_name: redis
    restart: always

    ports:
      - "6379:6379"
    expose:
      - "6379"
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx: 
    image: nginx:alpine
    container_name: nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    
    depends_on:
      - web
      - portal
      - api
    networks:
      app-network:
        aliases:
          - fch-catechesis.org
          - www.fch-catechesis.org
          - portal.fch-catechesis.org
          - api.fch-catechesis.org
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

