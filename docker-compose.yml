services:

  web:
    build: 
      context: .
      target: web
    container_name: web
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  portal:
    build: 
      context: .
      target: portal
    container_name: portal
    restart: always
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  api:
    build: 
      context: .
      target: api
    container_name: api
    restart: always
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/fch_portal?sslmode=disable}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-Vy1TL6YqQ2xvnRXpV3ZmmatPfod40UnP}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-Vy1TL6YqQ2xvnRXpV3ZmmatPfod40UnP}
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: always

    environment:
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_DB=${DATABASE_DB:-fch_portal}
    
    volumes:
      - postgres_data:/var/lib/postgresql

    ports:
      - "5432:5432"
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  redis: 
    image: redis:7-alpine

    container_name: redis
    restart: always

    expose:
      - "6379"
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx: 
    image: nginx:alpine
    container_name: nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - web
      - portal
      - api
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

