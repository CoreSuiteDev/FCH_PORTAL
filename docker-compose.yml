services:
  web:
    build:
      context: .
      target: web
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL}
    container_name: web
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000

    networks:
      - app-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portal:
    build:
      context: .
      target: portal
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL}
        - NEXT_PUBLIC_LOGIN_URL=${NEXT_PUBLIC_LOGIN_URL}

    container_name: portal

    restart: unless-stopped

    expose:
      - "3001"

    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3001

    networks:
      - app-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      target: api

    container_name: api
    restart: unless-stopped

    expose:
      - "5000"

    environment:
      NODE_ENV: production

      DATABASE_URL: ${DATABASE_URL:-postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_DB}?sslmode=disable}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}

      FRONTEND_URL: ${FRONTEND_URL}
      PORTAL_URL: ${PORTAL_URL}

      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      CORS_ORIGIN: ${CORS_ORIGIN}

      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}

      LOG_FORMAT: ${LOG_FORMAT}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}

      SMTP_USER_EMAIL: ${SMTP_USER_EMAIL}
      SMTP_CLIENT_ID: ${SMTP_CLIENT_ID}
      SMTP_CLIENT_SECRET: ${SMTP_CLIENT_SECRET}
      SMTP_REFRESH_TOKEN: ${SMTP_REFRESH_TOKEN}

      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - app-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_DB}

    volumes:
      - postgres_data:/var/lib/postgresql

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine

    container_name: redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --protected-mode
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD}"

    volumes:
      - redis_data:/data

    expose:
      - "6379"

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine

    container_name: nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      - web
      - portal
      - api

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    networks:
      app-network:
        aliases:
          - fch-catechesis.org
          - www.fch-catechesis.org
          - portal.fch-catechesis.org
          - api.fch-catechesis.org

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
