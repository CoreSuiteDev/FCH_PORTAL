events {
    worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # WebSocket connection handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }


    # Rate limit
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;


    # Global security
    client_max_body_size 20M;


    upstream web_app {
        server web:3000;
    }

    upstream portal_app {
        server portal:3001;
    }

    upstream api_service {
        server api:5000;
    }


    # HTTP -> HTTPS
    server {

        listen 80;

        server_name 
            fch-catechesis.org
            www.fch-catechesis.org
            portal.fch-catechesis.org
            api.fch-catechesis.org;

        return 301 https://$host$request_uri;
    }



    server {

        listen 443 ssl;
        server_name 
            fch-catechesis.org
            www.fch-catechesis.org;


        ssl_certificate 
            /etc/letsencrypt/live/fch-catechesis.org/fullchain.pem;

        ssl_certificate_key
            /etc/letsencrypt/live/fch-catechesis.org/privkey.pem;


        ssl_protocols TLSv1.2 TLSv1.3;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;


        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;



        location / {

            proxy_pass http://web_app;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
                $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;
        }



        location /api/ {

            limit_req zone=api_limit burst=20 nodelay;


            proxy_pass http://api_service;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
                $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;
        }



        location /trpc/ {

            limit_req zone=api_limit burst=20 nodelay;


            proxy_pass http://api_service;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
                $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;
        }



        location /health {

            allow 127.0.0.1;
            deny all;


            proxy_pass http://api_service;

            proxy_set_header Host $host;
        }
    }




    server {

        listen 443 ssl;

        server_name portal.fch-catechesis.org;


        ssl_certificate
        /etc/letsencrypt/live/fch-catechesis.org/fullchain.pem;


        ssl_certificate_key
        /etc/letsencrypt/live/fch-catechesis.org/privkey.pem;


        ssl_protocols TLSv1.2 TLSv1.3;


        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;



        location / {

            proxy_pass http://portal_app;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection $connection_upgrade;


            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;
        }



        location /api/ {

            limit_req zone=api_limit burst=20 nodelay;


            proxy_pass http://api_service;


            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection $connection_upgrade;


            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;

            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }



    server {

        listen 443 ssl;

        server_name api.fch-catechesis.org;


        ssl_certificate
        /etc/letsencrypt/live/fch-catechesis.org/fullchain.pem;


        ssl_certificate_key
        /etc/letsencrypt/live/fch-catechesis.org/privkey.pem;


        ssl_protocols TLSv1.2 TLSv1.3;



        add_header X-Content-Type-Options "nosniff" always;



        location / {


            limit_req zone=api_limit burst=20 nodelay;


            proxy_pass http://api_service;


            proxy_http_version 1.1;


            proxy_set_header Upgrade $http_upgrade;

            proxy_set_header Connection $connection_upgrade;


            proxy_set_header Host $host;


            proxy_set_header X-Real-IP $remote_addr;


            proxy_set_header X-Forwarded-For
            $proxy_add_x_forwarded_for;


            proxy_set_header X-Forwarded-Proto $scheme;
        }

    }

}